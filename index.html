<!DOCTYPE html>
<html>
<head>
  <title>My Business</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    section {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>Aljhune Coffee Shop</h1>
  <p>Mapapamura ka sa sarap ko ☕</p>
</header>

<section>
  <div class="card">
    <h2>About Us</h2>
    <p>We serve affordable and delicious coffee.</p>
  </div>

  <div class="card">
    <h2>Menu</h2>
    <p>☕ Latte - ₱120</p>
    <p>☕ Cappuccino - ₱130</p>
  </div>

  <div class="card">
    <h2>Contact</h2>
    <p>📞 09123456789</p>
    <button onclick="alert('Message Sent!')">Message Us</button>
  </div>
</section>

</body>
</html>
